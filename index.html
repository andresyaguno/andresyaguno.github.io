<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Andrés Yaguno - Ingresante Primer Puesto UNSA, Estudiante de Ciencia de la Computación.">
    <meta name="keywords" content="Andrés Yaguno, UNSA, Ciencia de Computación, Ingresante Primer Puesto, Programación">
    <meta name="author" content="Andrés Yaguno">
    <meta property="og:title" content="Andrés Yaguno | Ingresante Primer Puesto UNSA">
    <meta property="og:description" content="Estudiante de Ciencia de la Computación - Ingresante Primer Puesto UNSA">
    <script type="application/ld+json">{"@context":"https://schema.org/","@type":"Person","name":"Andrés Yaguno","description":"Estudiante de Ciencia de la Computación, Ingresante Primer Puesto UNSA","jobTitle":"Desarrollador Web","award":"Ingresante Primer Puesto UNSA"}</script>
    <title>Andrés Yaguno | Ingresante UNSA | Ciencia de Computación</title>
    <style>
        *{margin:0;padding:0}body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden}canvas{position:fixed;top:0;left:0}#neoImage{position:fixed;top:20%;left:50%;transform:translate(-50%,-50%);z-index:15;width:200px;height:200px;object-fit:cover;border-radius:50%}.container{text-align:center;color:#0f0;z-index:10;position:relative}h1{font-size:50px;text-shadow:0 0 10px #0f0}p{font-size:20px;margin-top:20px}a{color:#0ff;text-decoration:none;margin:0 15px;transition:all .3s}a:hover{text-shadow:0 0 10px #0ff;font-weight:bold}.badge{color:#ff0}.links{margin-top:40px;font-size:16px}footer{position:fixed;bottom:10px;right:10px;color:#666;font-size:12px;z-index:5}
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="container">
        <img id="neoImage" src="https://media1.tenor.com/m/iLhc4-omcucAAAAd/matrix-keanu-reaves.gif" alt="Neo">
        <h1 id="titulo"></h1>
        <p id="subtitulo"></p>
        <p id="logro"><span class="badge">⭐ Ingresante Primer Puesto UNSA</span></p>
        <p id="mensaje"></p>
        <div class="links">
            <a href="https://www.unsa.edu.pe/" target="_blank">Universidad UNSA</a>
            <a href="https://www.instagram.com/mendel/" target="_blank">Felicitación Mendel</a>
            <a href="https://www.instagram.com/andresyaguno" target="_blank">Mi Instagram</a>
        </div>
    </div>
    <footer>&copy; 2024 Andrés Yaguno - Arequipa, Perú</footer>

    <script>
        // Matrix
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = innerWidth;
        canvas.height = innerHeight;
        let drops = Array(Math.floor(canvas.width / 16)).fill(0);
        
        setInterval(() => {
            ctx.fillStyle = 'rgba(17,17,17,0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = '16px Arial';
            ctx.fillStyle = '#0c3';
            drops.forEach((d, i) => {
                ctx.fillText(String.fromCharCode(33 + Math.random() * 93), i * 16, d * 16);
                if (d * 16 > canvas.height && Math.random() > 0.99) drops[i] = 0;
                drops[i]++;
            });
        }, 50);
        
        // Neo Animation
        const neo = document.getElementById('neoImage');
        let t = 0, animating = false;
        
        const animate = () => {
            if (!animating) return;
            t += 0.02;
            const scale = 0.3 + t * 0.45;
            const opacity = Math.max(0, 1 - t * 0.5);
            neo.style.transform = `translate(-50%,-50%) scale(${scale})`;
            neo.style.opacity = opacity;
            if (opacity <= 0 || scale > 1.2) {
                animating = false;
                neo.style.display = 'none';
                setTimeout(present, 500);
            } else {
                requestAnimationFrame(animate);
            }
        };
        
        const typewrite = (el, text, speed, cb) => {
            let i = 0;
            el.textContent = '';
            const type = () => {
                if (i < text.length) {
                    el.textContent += text[i++];
                    setTimeout(type, speed);
                } else cb && cb();
            };
            type();
        };
        
        const present = () => {
            typewrite(document.getElementById('titulo'), 'ANDRES YAGUNO', 100, () => {
                typewrite(document.getElementById('subtitulo'), 'Estudiante de Ciencia de la Computacion', 50, () => {
                    typewrite(document.getElementById('mensaje'), '>>> BIENVENIDO <<<', 100);
                });
            });
        };
        
        const start = () => {
            t = 0;
            animating = false;
            neo.style.display = 'block';
            neo.style.opacity = 1;
            neo.style.transform = 'translate(-50%,-50%) scale(0.3)';
            document.getElementById('titulo').textContent = '';
            document.getElementById('subtitulo').textContent = '';
            document.getElementById('mensaje').textContent = '';
            setTimeout(() => {
                animating = true;
                t = 0;
                animate();
            }, 2000);
        };
        
        start();
        addEventListener('keydown', e => e.code === 'Space' && (e.preventDefault(), start()));
        document.querySelector('.container').addEventListener('click', () => start());
    </script>
</body>
</html>
